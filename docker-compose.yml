services:

  node-api:
    build: ./node-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - DB_PATH=/app/data/sentinel.db
      - RUST_CORE_URL=http://rust-core:8080
    volumes:
      - db-data:/app/data
      - ${SCAN_PATH}:/scan:ro
    depends_on:
      - rust-core
    restart: unless-stopped

  rust-core:
    build: ./rust-core
    expose:
      - "8080"
    volumes:
      - ${SCAN_PATH}:/scan:ro
    restart: unless-stopped

volumes:
  db-data: